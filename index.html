<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动漫角色抢答赛</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="房间设置">
        <div>
          <p class="eyebrow">双人房间</p>
          <h1>动漫角色抢答赛</h1>
        </div>
        <div class="room-controls">
          <label>
            房间号
            <input id="roomCode" maxlength="12" autocomplete="off" />
          </label>
          <button id="createRoom" type="button">生成</button>
          <button id="joinRoom" type="button">进入</button>
        </div>
      </section>

      <section class="players" aria-label="玩家状态">
        <article id="playerA" class="player-card">
          <span class="player-label">玩家 A</span>
          <strong class="score">1</strong>
          <span class="choice">等待加入</span>
        </article>
        <article id="playerB" class="player-card">
          <span class="player-label">玩家 B</span>
          <strong class="score">1</strong>
          <span class="choice">等待加入</span>
        </article>
      </section>

      <section class="game-shell" aria-label="游戏区">
        <div class="status-line">
          <span id="identity">未进入房间</span>
          <span id="roundInfo">第 0 / 10 轮</span>
          <span id="timer">18 秒</span>
        </div>

        <div class="portrait-wrap">
          <img id="portrait" alt="等待开始" />
          <div id="emptyState" class="empty-state">
            <strong>输入或生成房间号</strong>
            <span>两个人打开这个页面，进入同一个房间后就能开始。</span>
          </div>
        </div>

        <div id="options" class="options" aria-label="答案选项"></div>

        <div id="hints" class="hints" aria-label="本轮提示">
          <span>💡 提示会在第 8 秒和第 13 秒出现</span>
        </div>

        <div class="actions">
          <button id="startGame" type="button" disabled>开始游戏</button>
          <button id="resetGame" type="button" disabled>重开本局</button>
        </div>

        <p id="message" class="message">还没有进入房间。</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
